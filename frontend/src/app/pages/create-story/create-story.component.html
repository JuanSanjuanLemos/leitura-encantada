<div class="dashboard-wrapper">
  <header class="dashboard-header">
    <div class="logo cursor-pointer" routerLink="/teacher">Leitura Encantada</div>
    <div class="user-profile" *ngIf="auth.user$ | async as user">
      <img [src]="user.photoURL" alt="Avatar" class="avatar" *ngIf="user.photoURL" />
      <button class="logout-btn" (click)="auth.logout()">Sair</button>
    </div>
  </header>

  <main class="dashboard-content">
    <button class="back-btn" routerLink="/teacher">← Voltar ao painel</button>
    
    <app-generic-card 
      title="Criar Novo Conto Gamificado" 
      description="Digite ou cole a história infantil abaixo. Nossa Inteligência Artificial cuidará de criar as pausas e os jogos interativos."
      customClass="large-card">
      
      <form [formGroup]="storyForm" (ngSubmit)="submitStory()" class="story-form">
        <div class="form-group">
          <label for="title">Título da História</label>
          <input id="title" type="text" formControlName="title" placeholder="Ex: O Pequeno Príncipe" class="form-control" />
        </div>

        <div class="form-group flex-group">
          <label for="content">Texto / Enredo do Conto</label>
          
          <label class="file-upload-btn">
            <input type="file" accept=".txt" (change)="onFileSelected($event)" />
            <span>📄 Fazer upload de arquivo (.txt)</span>
          </label>
        </div>
        
        <textarea id="content" formControlName="content" rows="12" placeholder="Era uma vez, em um reino muito distante..." class="form-control textarea"></textarea>
        
        <div class="form-actions">
          <app-button variant="primary" [loading]="isProcessing" [disabled]="storyForm.invalid" (action)="submitStory()">
            Gerar Rotina com Inteligência Artificial
          </app-button>
        </div>
      </form>

    </app-generic-card>
  </main>
</div>
